name: Release

# Runs on every push to main (the changesets base branch). With pending changesets the
# changesets action opens/updates a "Version Packages" PR; merging that PR bumps the
# version and the next run publishes ashward to npm via OIDC trusted publishing
# (tokenless, with automatic provenance). Configure the trusted publisher on npmjs.com
# once the package exists (Packages -> ashward -> Settings -> Trusted publishing).
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: bunx changeset publish
          title: 'chore(release): version ashward'
          commit: 'chore(release): version ashward'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
