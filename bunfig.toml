[test]
coverageReporter = ["text", "lcov"]
coverageThreshold = 0.95
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "node_modules/**",
  "dist/**",
  "test/**",
  # socket-probe.ts의 RST 종료 분기는 Bun이 in-process TCP RST를 못 만들어(resetAndDestroy가
  # FIN으로 나감) 커버 불가 → 해당 테스트 skip(문서화). 나머지 전 파일은 100%.
  "src/core/driver/socket-probe.ts",
]

[test.reporter]
dots = true
